<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen System - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom subtle animation for the background */
        .bg-animate {
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 via-gray-50 to-orange-100 bg-animate font-sans text-gray-900">

    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white shadow-2xl rounded-3xl p-10 m-4 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-400 to-orange-600"></div>

        <div class="flex justify-center mb-8">
            <div class="p-3 bg-orange-100 rounded-2xl shadow-inner">
                <svg class="w-10 h-10 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                </svg>
            </div>
        </div>
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight text-gray-900">Welcome back</h2>
            <p class="text-sm text-gray-500 mt-2">Enter your credentials to access your dashboard.</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:bg-white outline-none transition-all duration-200 shadow-sm" 
                    placeholder="hello@neighborhood.com">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                    <a href="passwordrest.html" class="text-sm font-medium text-orange-500 hover:text-orange-600 transition">Forgot password?</a>
                </div>
                <div class="relative">
                    <input type="password" id="password" required 
                        class="w-full px-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:bg-white outline-none transition-all duration-200 shadow-sm pr-10" 
                        placeholder="••••••••">
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-orange-500 focus:outline-none transition">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex items-center">
                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-orange-500 focus:ring-orange-500 border-gray-300 rounded cursor-pointer transition">
                <label for="remember-me" class="ml-2 block text-sm text-gray-700 cursor-pointer">
                    Remember me for 30 days
                </label>
            </div>

            <button type="submit" id="submit-btn" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transform transition hover:-translate-y-0.5">
                Sign In
            </button>
        </form>

        <div id="error-message" class="mt-4 p-3 rounded-lg bg-red-50 border border-red-100 text-sm text-red-600 text-center hidden"></div>

        <p class="mt-8 text-center text-sm text-gray-600">
            Don't have an account? 
            <a href="register.html" class="font-bold text-orange-500 hover:text-orange-600 transition">Sign up now</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpwR1fxkEMTkpcVIQtkzcu91Ce-VJ2pYs",
            authDomain: "mark-kenya.firebaseapp.com",
            projectId: "mark-kenya",
            storageBucket: "mark-kenya.firebasestorage.app",
            messagingSenderId: "205623271753",
            appId: "1:205623271753:web:8b3e8f46bfc0784f577a98"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const rememberMeCheckbox = document.getElementById('remember-me');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        // Password Visibility Toggle
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        // Form Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const rememberMe = rememberMeCheckbox.checked;
            
            // Visual feedback
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            submitBtn.disabled = true;
            errorMessage.classList.add('hidden');

            try {
                // Handle persistence based on "Remember Me" checkbox
                const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                // Sign in the user
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log("User logged in successfully:", user.uid);
                
                // Redirect to the dashboard
                window.location.href = "dashboard.html";

            } catch (error) {
                console.error(error.code, error.message);
                
                // User-friendly error messages
                if (error.code === 'auth/invalid-credential') {
                    errorMessage.textContent = "Invalid email or password. Please try again.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage.textContent = "Too many failed attempts. Please try again later or reset your password.";
                } else {
                    errorMessage.textContent = error.message;
                }
                
                errorMessage.classList.remove('hidden');
                
                // Reset button state
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
